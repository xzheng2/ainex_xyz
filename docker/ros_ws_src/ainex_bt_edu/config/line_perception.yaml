# Line detection calibration for ainex_bt_edu.
#
# center_x_offset: calibrated shift of "ideal centre" relative to the image
# geometric centre, in pixels.  Positive value = the physical camera centre
# is offset to the right of the image midpoint.
#
# This value is read by LineDetectionAdapter at startup and used to compute
# /latched/line_error_x = line_data.x - (width/2 + center_x_offset).
#
# NOTE: 66 preserves the current robot behaviour — matches the value that
# VisualPatrol previously read from ainex_example/config/calib.yaml.
# Set to 0 only if the camera is physically centred.
center_x_offset: 66
