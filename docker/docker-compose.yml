version: "3.9"

# ============================================================================
# Ainex Robot — Docker Compose
#
# Services:
#   rosa-agent  — NASA JPL ROSA, read-only diagnostic agent (ROS1/Noetic)
#   ainex2      — ROS2 Humble base image (Stage 1 migration, aarch64)
#
# The 'ainex' container (ROS1 Noetic) is managed separately (pre-existing,
# started manually). All containers use host networking so they share the
# host's network namespace without bridge conflicts.
# ROS2 uses DDS — no ROS_MASTER_URI needed.
#
# Start rosa-agent:  docker compose up rosa-agent
# Build ainex2:      docker compose build ainex2
# Run ainex2 shell:  docker compose run --rm ainex2
# ============================================================================

services:

  # ── ROSA diagnostic agent (read-only) ─────────────────────────────────────
  rosa-agent:
    build:
      # Build context is docker/ so the Dockerfile can COPY ainex_interfaces
      # from the ROS workspace source alongside rosa-agent/.
      # Dockerfile is still at rosa-agent/Dockerfile.
      context: .
      dockerfile: rosa-agent/Dockerfile
    image: ainex-rosa-agent:latest
    container_name: rosa-agent
    network_mode: host
    restart: unless-stopped

    # ROS network configuration (host networking: roscore is on localhost)
    environment:
      ROS_MASTER_URI: http://127.0.0.1:11311
      AINEX_WRITE_ENABLED: "false"   # Phase 1: read-only. Change only after audit.

    # Load secrets from .env file (API keys etc.) — NOT committed to git
    env_file:
      - ./rosa-agent/.env            # Copy from rosa-agent/.env.example

    # Interactive terminal for CLI mode
    stdin_open: true
    tty: true

    # Volumes
    volumes:
      - /home/pi/docker/rosa-agent:/opt/rosa-agent  # live-mount source (edit on host, instant in container)
      - rosa_agent_logs:/opt/rosa-agent/logs
      - /home/pi/docker/ros_log:/root/.ros/log:ro   # ainex ROS logs (read-only)
      - /home/pi/docker/ros_ws_src/ainex_behavior/marathon/log:/opt/ainex_bt_log:ro  # BT observability logs
      - /etc/localtime:/etc/localtime:ro             # sync timezone with host
      - /etc/timezone:/etc/timezone:ro

    # Healthcheck: verify ROS master is reachable
    healthcheck:
      test:
        - CMD
        - python3.9
        - -c
        - |
          import rosgraph
          m = rosgraph.Master('/healthcheck')
          m.getPid()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ainex2 — ROS2 Humble (Stage 1: base image only, workspace TBD) ─────────
  ainex2:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    image: ainex2:humble
    container_name: ainex2
    network_mode: host
    privileged: true
    group_add:
      - "1001"  # host gpiochip device group (unnamed on Pi 5)
    environment:
      - DISPLAY=:1
      - LIBGL_ALWAYS_SOFTWARE=1
      - ROS_DOMAIN_ID=0
    volumes:
      - /home/pi/docker/ros2_ws_src:/home/ubuntu/ros2_ws/src
      - /home/pi/docker/src:/home/ubuntu/share/src
      - /home/pi/docker/tmp:/home/ubuntu/share/tmp
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  rosa_agent_logs:
